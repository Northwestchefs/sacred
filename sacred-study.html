<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sacred · Study Dashboard</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="study">
    <header class="site-header">
      <div class="header-inner">
        <h1 class="brand">Sacred</h1>
        <nav class="site-nav" aria-label="Primary navigation">
          <a data-nav-key="home" href="./">Home</a>
          <a data-nav-key="read" href="hebrew-bible/">Read</a>
          <a data-nav-key="study" href="sacred-study.html">Study</a>
          <a data-nav-key="about" href="about/">About</a>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="card">
        <p class="kicker">Sacred Study Dashboard</p>
        <h2>Mystical study tools in one place</h2>
        <p id="study-page-status" class="reader-status">Loading study modules…</p>
      </section>

      <section id="verse-viewer-slot"></section>
      <section id="gematria-tool-slot"></section>

      <section class="card" aria-label="Divine name explorer">
        <h2>Divine name explorer</h2>
        <form id="divine-name-form" class="study-form">
          <label for="divine-name-input">Divine name</label>
          <div class="study-row">
            <input id="divine-name-input" type="text" value="יהוה" placeholder="Type a divine name" required />
            <button class="button" type="submit">Analyze</button>
          </div>
        </form>
        <p id="divine-name-output" class="study-highlight">Gematria: — · Sefirah: —</p>
        <h3>Permutations</h3>
        <ul id="divine-name-permutations" class="study-list study-list-columns"></ul>
      </section>

      <section id="tree-of-life-slot"></section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>Sacred · Mystical study tools built for static GitHub Pages.</p>
      </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script type="module" src="js/sacred-study.js"></script>
  </body>
</html>
