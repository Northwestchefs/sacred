<section class="card" aria-label="Gematria calculator">
  <h2>Gematria calculator</h2>
  <form id="gematria-form" class="study-form">
    <label for="gematria-input">Hebrew text</label>
    <div class="study-row">
      <input id="gematria-input" type="text" value="שמע ישראל" placeholder="Type Hebrew text" required />
      <button class="button" type="submit">Calculate</button>
    </div>
  </form>
  <p id="gematria-total" class="study-highlight">Total: —</p>
  <ul id="gematria-breakdown" class="study-list"></ul>
</section>
