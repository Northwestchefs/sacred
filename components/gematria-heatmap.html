<section class="card" aria-label="Gematria heatmap">
  <h2>Gematria Heatmap</h2>
  <form id="heatmap-form" class="study-form">
    <label for="heatmap-book-select">Book</label>
    <div class="study-row">
      <select id="heatmap-book-select" required></select>
      <button class="button" type="submit">Load heatmap</button>
    </div>
  </form>
  <canvas id="gematria-heatmap-canvas" width="880" height="300" aria-label="Gematria verse heatmap"></canvas>
  <p id="gematria-heatmap-status" class="reader-status">Choose a book to build a gematria map.</p>
</section>
