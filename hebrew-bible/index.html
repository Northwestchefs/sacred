<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sacred · Hebrew Bible Reader</title>
    <link rel="stylesheet" href="../src/pages/hebrewBibleReader/styles.css" />
  </head>
  <body>
    <main class="reader-page">
      <header class="reader-header">
        <p class="reader-kicker">Sacred Texts</p>
        <h1>Hebrew Bible Reader</h1>
        <p class="reader-subtitle">
          Read the Hebrew text by canonical book and chapter. Numbering and source order are preserved.
        </p>
      </header>

      <section class="reader-controls" aria-label="Reading controls">
        <div class="control-field">
          <label for="book-select">Book</label>
          <select id="book-select" name="book"></select>
        </div>
        <div class="control-field">
          <label for="chapter-select">Chapter</label>
          <select id="chapter-select" name="chapter" disabled></select>
        </div>
        <div class="control-field">
          <label for="verse-input">Jump to verse</label>
          <input id="verse-input" name="verse" type="number" min="1" inputmode="numeric" placeholder="e.g. 1" />
        </div>
      </section>

      <section class="reader-search" aria-label="Search and direct navigation">
        <form id="reference-form" class="search-form">
          <label for="reference-input">Go to reference</label>
          <div class="search-row">
            <input id="reference-input" name="reference" type="text" placeholder="Genesis 1:1 or Bereshit 1:1" autocomplete="off" />
            <button type="submit">Go</button>
          </div>
        </form>

        <form id="search-form" class="search-form">
          <label for="search-input">Search verse text</label>
          <div class="search-row">
            <input id="search-input" name="search" type="search" placeholder="Enter a Hebrew phrase or reference" autocomplete="off" />
            <button type="submit">Search</button>
          </div>
        </form>

        <ul id="search-results" class="search-results" aria-live="polite"></ul>
      </section>

      <p id="reader-status" class="reader-status" role="status" aria-live="polite"></p>

      <section class="reader-body" aria-label="Hebrew chapter reading">
        <div class="future-slot" aria-hidden="true">Future slot: commentary and cross references</div>
        <ol id="verses-list" class="verses-list"></ol>
      </section>
    </main>

    <script type="module" src="../src/pages/hebrewBibleReader/index.js"></script>
  </body>
</html>
